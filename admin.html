<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>жЦ∞йЧїеРОеП∞зЃ°зРЖ - еєњдЄЬиЙЊйЗМж£ЃеЕЙзФ?/title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #0c0c0c; color: #fff; min-height: 100vh; }
        .header { background: #111; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #FFD700; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .btn { padding: 10px 25px; border-radius: 5px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.3s; }
        .btn-primary { background: #FFD700; color: #000; }
        .btn-primary:hover { background: #FFA500; }
        .btn-success { background: #07c160; color: #fff; }
        .btn-success:hover { background: #06ad56; }
        .btn-danger { background: #e6162d; color: #fff; }
        .btn-danger:hover { background: #d11428; }
        .btn-secondary { background: #666; color: #fff; }
        .btn-secondary:hover { background: #555; }
        .news-list { margin-top: 30px; }
        .news-item { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .news-info { flex: 1; }
        .news-info h3 { color: #FFD700; margin-bottom: 8px; }
        .news-info p { color: #999; font-size: 14px; }
        .news-info .meta { color: #666; font-size: 12px; margin-top: 8px; }
        .news-actions { display: flex; gap: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 30px; max-width: 900px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .modal-header h2 { color: #FFD700; }
        .close-btn { background: #e6162d; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #FFD700; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 5px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #FFD700; }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .content-builder { border: 1px dashed #333; border-radius: 8px; padding: 20px; margin-top: 10px; }
        .content-block { background: #111; border: 1px solid #333; border-radius: 5px; padding: 15px; margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start; }
        .content-block .block-type { color: #FFD700; font-size: 12px; min-width: 80px; }
        .content-block .block-content { flex: 1; }
        .content-block textarea { width: 100%; min-height: 60px; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px; }
        .add-block-btn { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .add-block-btn .btn { padding: 8px 15px; font-size: 12px; }
        .json-preview { background: #111; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-top: 30px; }
        .json-preview h3 { color: #FFD700; margin-bottom: 15px; }
        .json-preview pre { background: #0c0c0c; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 12px; color: #999; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .alert.success { background: rgba(7, 193, 96, 0.2); border: 1px solid #07c160; color: #07c160; }
        .alert.error { background: rgba(230, 22, 45, 0.2); border: 1px solid #e6162d; color: #e6162d; }
        .alert.active { display: block; }
        .help-text { color: #666; font-size: 12px; margin-top: 5px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .tab { padding: 10px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 5px; cursor: pointer; color: #999; }
        .tab.active { background: #FFD700; color: #000; border-color: #FFD700; }
        @media(max-width:768px){.news-item{flex-direction:column;gap:15px;align-items:flex-start}.news-actions{width:100%;justify-content:flex-end}}
    </style>
</head>
<body>
    <div class="header">
        <h1>рЯУ∞ жЦ∞йЧїеРОеП∞зЃ°зРЖ</h1>
        <div>
            <button class="btn btn-primary" onclick="openAddModal()">вЮ?жЈїеК†жЦ∞йЧї</button>
            <button class="btn btn-secondary" onclick="location.href='news.html'">рЯУЪ жЯ•зЬЛеЙНеП∞</button>
        </div>
    </div>

    <div class="container">
        <div id="alert" class="alert"></div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('list')">рЯУЛ жЦ∞йЧїеИЧи°®</div>
            <div class="tab" onclick="switchTab('export')">рЯУ§ еѓЉеЗЇжХ∞жНЃ</div>
        </div>

        <div id="list-tab">
            <div id="news-list" class="news-list">
                <p style="color: #FFD700; text-align: center; padding: 60px;">вП?ж≠£еЬ®еК†иљљжЦ∞йЧї...</p>
            </div>
        </div>

        <div id="export-tab" style="display: none;">
            <div class="json-preview">
                <h3>рЯУК ељУеЙНжЦ∞йЧїжХ∞жНЃ (data/news.json)</h3>
                <pre id="json-preview"></pre>
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="copyJSON()">рЯУЛ е§НеИґJSON</button>
                    <button class="btn btn-success" onclick="downloadJSON()">рЯТЊ дЄЛиљљJSON</button>
                </div>
                <p class="help-text">рЯТ° жПРз§ЇпЉЪдЄЛиљљеРОжЫњжНҐжЬНеК°еЩ®дЄКзЪ?data/news.json жЦЗдїґеН≥еПѓжЫіжЦ∞</p>
            </div>
        </div>
    </div>

    <!-- жЈїеК†/зЉЦиЊСжЦ∞йЧїеЉєз™Ч -->
    <div id="news-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">вЮ?жЈїеК†жЦ∞йЧї</h2>
                <button class="close-btn" onclick="closeModal()">вЬ?еЕ≥йЧ≠</button>
            </div>

            <form id="news-form">
                <input type="hidden" id="news-id">
                
                <div class="form-group">
                    <label>рЯУВ еИЖз±ї</label>
                    <select id="news-category" required>
                        <option value="ж°ИдЊЛжХЕдЇЛ">ж°ИдЊЛжХЕдЇЛ</option>
                        <option value="жКАжЬѓеє≤иі?>жКАжЬѓеє≤иі?/option>
                        <option value="зЧЫзВєиІ£еЖ≥">зЧЫзВєиІ£еЖ≥</option>
                        <option value="жµ™жЉЂжЙУеН°">жµ™жЉЂжЙУеН°</option>
                        <option value="и°МдЄЪжіЮеѓЯ">и°МдЄЪжіЮеѓЯ</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>рЯУЭ ж†ЗйҐШ</label>
                    <input type="text" id="news-title" placeholder="иЊУеЕ•жЦ∞йЧїж†ЗйҐШ" required>
                </div>

                <div class="form-group">
                    <label>рЯУЛ жППињ∞ (SEO)</label>
                    <textarea id="news-description" placeholder="иЊУеЕ•жЦ∞йЧїжППињ∞пЉМзФ®дЇОSEO"></textarea>
                </div>

                <div class="form-group">
                    <label>рЯФС еЕ≥йФЃиѓ?(SEO)</label>
                    <input type="text" id="news-keywords" placeholder="иЊУеЕ•еЕ≥йФЃиѓНпЉМзФ®йАЧеПЈеИЖйЪФ">
                </div>

                <div class="form-group">
                    <label>рЯЦЉпЄ?е∞БйЭҐеЫЊж†З</label>
                    <input type="text" id="news-image" placeholder="иЊУеЕ•emojiеЫЊж†ЗпЉМе¶ВпЉЪрЯФ? value="рЯФ•">
                    <p class="help-text">еЄЄзФ®еЫЊж†ЗпЉЪрЯФ•рЯТ°рЯШЂрЯТХрЯУКвЬ®рЯОЙ</p>
                </div>

                <div class="form-group">
                    <label>рЯУЕ еПСеЄГжЧ•жЬЯ</label>
                    <input type="date" id="news-date" required>
                </div>

                <div class="form-group">
                    <label>рЯСА йШЕиѓїйЗ?/label>
                    <input type="number" id="news-views" value="1000" required>
                </div>

                <div class="form-group">
                    <label>рЯУЦ жЦЗзЂ†еЖЕеЃє</label>
                    <div id="content-builder" class="content-builder">
                        <p style="color: #666; text-align: center; padding: 20px;">зВєеЗїдЄЛжЦєжМЙйТЃжЈїеК†еЖЕеЃєеЭ?/p>
                    </div>
                    <div class="add-block-btn">
                        <button type="button" class="btn btn-secondary" onclick="addContentBlock('text')">рЯУЭ жЦЗжЬђ</button>
                        <button type="button" class="btn btn-secondary" onclick="addContentBlock('heading')">рЯУМ ж†ЗйҐШ</button>
                        <button type="button" class="btn btn-secondary" onclick="addContentBlock('list')">рЯУЛ еИЧи°®</button>
                        <button type="button" class="btn btn-secondary" onclick="addContentBlock('highlight')">рЯТ° йЂШдЇЃ</button>
                    </div>
                </div>

                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <button type="submit" class="btn btn-primary">рЯТЊ дњЭе≠ШжЦ∞йЧї</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">вЬ?еПЦжґИ</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let newsData = [];
        let currentContentBlocks = [];
        let editingId = null;

        // еИЭеІЛеМ?        document.addEventListener('DOMContentLoaded', function() {
            loadNewsData();
            setTodayDate();
        });

        // иЃЊзљЃдїКе§©жЧ•жЬЯ
        function setTodayDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('news-date').value = today;
        }

        // еК†иљљжЦ∞йЧїжХ∞жНЃ
        async function loadNewsData() {
            try {
                const response = await fetch('data/news.json');
                newsData = await response.json();
                renderNewsList();
                updateJSONPreview();
            } catch (error) {
                console.error('еК†иљљжЦ∞йЧїе§±иі•:', error);
                showAlert('вЪ†пЄП еК†иљљжЦ∞йЧїе§±иі•пЉМиѓЈз°ЃдњЭ data/news.json жЦЗдїґе≠ШеЬ®', 'error');
                document.getElementById('news-list').innerHTML = '<p style="color: #e6162d; text-align: center; padding: 60px;">вЪ†пЄП еК†иљље§±иі•пЉМиѓЈж£АжЯ?data/news.json жЦЗдїґ</p>';
            }
        }

        // жЄ≤жЯУжЦ∞йЧїеИЧи°®
        function renderNewsList() {
            const list = document.getElementById('news-list');
            if (newsData.length === 0) {
                list.innerHTML = '<p style="color: #666; text-align: center; padding: 60px;">рЯУ≠ жЪВжЧ†жЦ∞йЧїпЉМзВєеЗ?жЈїеК†жЦ∞йЧї"еЉАеІ?/p>';
                return;
            }
            
            list.innerHTML = newsData.map(news => `
                <div class="news-item">
                    <div class="news-info">
                        <h3>${news.image} ${news.title}</h3>
                        <p>${news.category} ¬Ј ${news.date}</p>
                        <div class="meta">ID: ${news.id} ¬Ј йШЕиѓї: ${news.views} ¬Ј еЕ≥йФЃиѓ? ${news.keywords || '-'}</div>
                    </div>
                    <div class="news-actions">
                        <button class="btn btn-primary" onclick="editNews(${news.id})">вЬПпЄП зЉЦиЊС</button>
                        <button class="btn btn-danger" onclick="deleteNews(${news.id})">рЯЧСпЄ?еИ†йЩ§</button>
                    </div>
                </div>
            `).join('');
        }

        // еИЗжНҐTab
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'list') {
                document.getElementById('list-tab').style.display = 'block';
                document.getElementById('export-tab').style.display = 'none';
            } else {
                document.getElementById('list-tab').style.display = 'none';
                document.getElementById('export-tab').style.display = 'block';
                updateJSONPreview();
            }
        }

        // жЙУеЉАжЈїеК†еЉєз™Ч
        function openAddModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = 'вЮ?жЈїеК†жЦ∞йЧї';
            document.getElementById('news-form').reset();
            setTodayDate();
            document.getElementById('news-views').value = 1000;
            document.getElementById('news-image').value = 'рЯФ•';
            currentContentBlocks = [];
            document.getElementById('content-builder').innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">зВєеЗїдЄЛжЦєжМЙйТЃжЈїеК†еЖЕеЃєеЭ?/p>';
            document.getElementById('news-modal').classList.add('active');
        }

        // зЉЦиЊСжЦ∞йЧї
        function editNews(id) {
            const news = newsData.find(n => n.id === id);
            if (!news) return;
            
            editingId = id;
            document.getElementById('modal-title').textContent = 'вЬПпЄП зЉЦиЊСжЦ∞йЧї';
            document.getElementById('news-id').value = id;
            document.getElementById('news-category').value = news.category;
            document.getElementById('news-title').value = news.title;
            document.getElementById('news-description').value = news.description || '';
            document.getElementById('news-keywords').value = news.keywords || '';
            document.getElementById('news-date').value = news.date;
            document.getElementById('news-views').value = news.views;
            document.getElementById('news-image').value = news.image;
            
            currentContentBlocks = JSON.parse(JSON.stringify(news.content || []));
            renderContentBlocks();
            document.getElementById('news-modal').classList.add('active');
        }

        // еЕ≥йЧ≠еЉєз™Ч
        function closeModal() {
            document.getElementById('news-modal').classList.remove('active');
        }

        // жЈїеК†еЖЕеЃєеЭ?        function addContentBlock(type) {
            let block = { type: type };
            if (type === 'text') {
                block.text = 'еЬ®ињЩйЗМиЊУеЕ•жЦЗжЬђеЖЕеЃ?..';
            } else if (type === 'heading') {
                block.text = 'еЬ®ињЩйЗМиЊУеЕ•ж†ЗйҐ?..';
            } else if (type === 'list') {
                block.items = ['еИЧи°®й°?', 'еИЧи°®й°?', 'еИЧи°®й°?'];
            } else if (type === 'highlight') {
                block.text = 'еЬ®ињЩйЗМиЊУеЕ•йЂШдЇЃеЖЕеЃ?..';
            }
            currentContentBlocks.push(block);
            renderContentBlocks();
        }

        // жЄ≤жЯУеЖЕеЃєеЭ?        function renderContentBlocks() {
            const builder = document.getElementById('content-builder');
            if (currentContentBlocks.length === 0) {
                builder.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">зВєеЗїдЄЛжЦєжМЙйТЃжЈїеК†еЖЕеЃєеЭ?/p>';
                return;
            }
            
            builder.innerHTML = currentContentBlocks.map((block, index) => {
                let contentHtml = '';
                if (block.type === 'text' || block.type === 'heading' || block.type === 'highlight') {
                    contentHtml = `<textarea onchange="updateContentBlock(${index}, 'text', this.value)">${block.text || ''}</textarea>`;
                } else if (block.type === 'list') {
                    contentHtml = `<textarea onchange="updateContentBlock(${index}, 'items', this.value)" placeholder="жѓПи°МдЄАдЄ™еИЧи°®й°є">${(block.items || []).join('\\n')}</textarea>`;
                }
                
                return `
                    <div class="content-block">
                        <span class="block-type">${getBlockTypeName(block.type)}</span>
                        <div class="block-content">
                            ${contentHtml}
                        </div>
                        <button type="button" class="btn btn-danger" onclick="removeContentBlock(${index})" style="padding: 5px 10px;">вЬ?/button>
                    </div>
                `;
            }).join('');
        }

        // иОЈеПЦеЖЕеЃєеЭЧз±їеЮЛеРНзІ?        function getBlockTypeName(type) {
            const names = { 'text': 'рЯУЭ жЦЗжЬђ', 'heading': 'рЯУМ ж†ЗйҐШ', 'list': 'рЯУЛ еИЧи°®', 'highlight': 'рЯТ° йЂШдЇЃ' };
            return names[type] || type;
        }

        // жЫіжЦ∞еЖЕеЃєеЭ?        function updateContentBlock(index, field, value) {
            if (field === 'items') {
                currentContentBlocks[index].items = value.split('\\n').filter(item => item.trim());
            } else {
                currentContentBlocks[index][field] = value;
            }
        }

        // еИ†йЩ§еЖЕеЃєеЭ?        function removeContentBlock(index) {
            currentContentBlocks.splice(index, 1);
            renderContentBlocks();
        }

        // дњЭе≠ШжЦ∞йЧї
        document.getElementById('news-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const news = {
                id: editingId || getNextId(),
                category: document.getElementById('news-category').value,
                title: document.getElementById('news-title').value,
                description: document.getElementById('news-description').value,
                keywords: document.getElementById('news-keywords').value,
                date: document.getElementById('news-date').value,
                views: parseInt(document.getElementById('news-views').value),
                image: document.getElementById('news-image').value || 'рЯУ∞',
                imageGradient: getRandomGradient(),
                content: JSON.parse(JSON.stringify(currentContentBlocks))
            };
            
            if (editingId) {
                const index = newsData.findIndex(n => n.id === editingId);
                if (index !== -1) {
                    newsData[index] = news;
                }
                showAlert('вЬ?жЦ∞йЧїжЫіжЦ∞жИРеКЯпЉ?, 'success');
            } else {
                newsData.unshift(news);
                showAlert('вЬ?жЦ∞йЧїжЈїеК†жИРеКЯпЉ?, 'success');
            }
            
            renderNewsList();
            updateJSONPreview();
            closeModal();
        });

        // иОЈеПЦдЄЛдЄАдЄ™ID
        function getNextId() {
            if (newsData.length === 0) return 1;
            return Math.max(...newsData.map(n => n.id)) + 1;
        }

        // иОЈеПЦйЪПжЬЇжЄРеПШиЙ?        function getRandomGradient() {
            const gradients = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
                'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
            ];
            return gradients[Math.floor(Math.random() * gradients.length)];
        }

        // еИ†йЩ§жЦ∞йЧї
        function deleteNews(id) {
            if (!confirm('з°ЃеЃЪи¶БеИ†йЩ§ињЩжЭ°жЦ∞йЧїеРЧпЉ?)) return;
            newsData = newsData.filter(n => n.id !== id);
            renderNewsList();
            updateJSONPreview();
            showAlert('вЬ?жЦ∞йЧїеЈ≤еИ†йЩ?, 'success');
        }

        // жЫіжЦ∞JSONйҐДиІИ
        function updateJSONPreview() {
            document.getElementById('json-preview').textContent = JSON.stringify(newsData, null, 2);
        }

        // е§НеИґJSON
        function copyJSON() {
            const json = JSON.stringify(newsData, null, 2);
            const tempInput = document.createElement('textarea');
            tempInput.value = json;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            showAlert('вЬ?JSONеЈ≤е§НеИґеИ∞еЙ™иііжЭњпЉБ', 'success');
        }

        // дЄЛиљљJSON
        function downloadJSON() {
            const json = JSON.stringify(newsData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'news.json';
            a.click();
            URL.revokeObjectURL(url);
            showAlert('вЬ?JSONжЦЗдїґеЈ≤дЄЛиљљпЉБ', 'success');
        }

        // жШЊз§ЇжПРз§Ї
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type + ' active';
            setTimeout(() => alert.classList.remove('active'), 3000);
        }

        // зВєеЗїеЉєз™Че§ЦйГ®еЕ≥йЧ≠
        document.getElementById('news-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
