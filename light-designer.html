    <script>
        const canvas = document.getElementById('design-canvas');
        const ctx = canvas.getContext('2d');
        const nodePanel = document.getElementById('node-panel');
        const welcomeOverlay = document.getElementById('welcome-overlay');
        
        let nodes = [];
        let connections = [];
        let selectedNode = null;
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        let isConnecting = false;
        let connectionStart = null;
        
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            render();
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        document.getElementById('start-design').addEventListener('click', () => {
            welcomeOverlay.style.display = 'none';
        });
        
        document.getElementById('toggle-panel').addEventListener('click', () => {
            nodePanel.classList.toggle('open');
        });
        
        document.getElementById('save-project').addEventListener('click', () => {
            const project = { nodes, connections };
            const dataStr = JSON.stringify(project, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'light-design-project.json';
            a.click();
        });
        
        document.getElementById('clear-canvas').addEventListener('click', () => {
            if (confirm('зЎ®е®ҡиҰҒжё…з©әз”»еёғеҗ—пј?)) {
                nodes = [];
                connections = [];
                render();
            }
        });
        
        document.getElementById('preview-design').addEventListener('click', () => {
            alert('йў„и§ҲеҠҹиғҪеҚіе°ҶдёҠзәҝпјҒ\n\nжӯӨеҠҹиғҪе°ҶжЁЎжӢҹзҒҜе…үж•ҲжһңпјҢи®©жӮЁйў„и§ҲжңҖз»Ҳж•ҲжһңгҖ?);
        });
        
        document.querySelectorAll('.node-item').forEach(item => {
            item.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('node-type', item.dataset.type);
                e.dataTransfer.setData('node-name', item.querySelector('.node-name').textContent);
                e.dataTransfer.setData('node-icon', item.querySelector('.node-icon').textContent);
            });
        });
        
        canvas.addEventListener('dragover', (e) => {
            e.preventDefault();
        });
        
        canvas.addEventListener('drop', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const nodeType = e.dataTransfer.getData('node-type');
            const nodeName = e.dataTransfer.getData('node-name');
            const nodeIcon = e.dataTransfer.getData('node-icon');
            
            if (nodeType) {
                addNode(x, y, nodeType, nodeName, nodeIcon);
            }
        });
        
        function addNode(x, y, type, name, icon) {
            nodes.push({
                id: Date.now(),
                x: x - 80,
                y: y - 40,
                width: 160,
                height: 80,
                type,
                name,
                icon,
                inputs: [{ id: 'in', x: 0, y: 40 }],
                outputs: [{ id: 'out', x: 160, y: 40 }]
            });
            render();
        }
        
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            for (let node of nodes) {
                for (let output of node.outputs) {
                    const ox = node.x + output.x;
                    const oy = node.y + output.y;
                    if (Math.hypot(x - ox, y - oy) < 10) {
                        isConnecting = true;
                        connectionStart = { node, output };
                        return;
                    }
                }
            }
            
            for (let i = nodes.length - 1; i >= 0; i--) {
                const node = nodes[i];
                if (x >= node.x && x <= node.x + node.width &&
                    y >= node.y && y <= node.y + node.height) {
                    selectedNode = node;
                    isDragging = true;
                    dragOffset = { x: x - node.x, y: y - node.y };
                    nodes.splice(i, 1);
                    nodes.push(node);
                    render();
                    return;
                }
            }
            
            selectedNode = null;
            render();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (isDragging && selectedNode) {
                selectedNode.x = x - dragOffset.x;
                selectedNode.y = y - dragOffset.y;
                render();
            } else if (isConnecting) {
                render();
                ctx.beginPath();
                ctx.moveTo(connectionStart.node.x + connectionStart.output.x, 
                          connectionStart.node.y + connectionStart.output.y);
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        });
        
        canvas.addEventListener('mouseup', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (isConnecting) {
                for (let node of nodes) {
                    if (node !== connectionStart.node) {
                        for (let input of node.inputs) {
                            const ix = node.x + input.x;
                            const iy = node.y + input.y;
                            if (Math.hypot(x - ix, y - iy) < 10) {
                                connections.push({
                                    from: { node: connectionStart.node, output: connectionStart.output },
                                    to: { node, input }
                                });
                                break;
                            }
                        }
                    }
                }
            }
            
            isDragging = false;
            isConnecting = false;
            connectionStart = null;
            render();
        });
        
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();
            
            for (let conn of connections) {
                ctx.beginPath();
                ctx.moveTo(conn.from.node.x + conn.from.output.x, 
                          conn.from.node.y + conn.from.output.y);
                ctx.lineTo(conn.to.node.x + conn.to.input.x, 
                          conn.to.node.y + conn.to.input.y);
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            for (let node of nodes) {
                const isSelected = node === selectedNode;
                
                ctx.fillStyle = isSelected ? '#16213e' : '#0f3460';
                ctx.strokeStyle = isSelected ? '#ffd700' : '#e94560';
                ctx.lineWidth = isSelected ? 3 : 2;
                ctx.beginPath();
                ctx.roundRect(node.x, node.y, node.width, node.height, 12);
                ctx.fill();
                ctx.stroke();
                
                ctx.font = '28px Arial';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText(node.icon, node.x + node.width/2, node.y + 35);
                
                ctx.font = '12px Arial';
                ctx.fillStyle = '#ccc';
                ctx.fillText(node.name, node.x + node.width/2, node.y + 55);
                
                for (let input of node.inputs) {
                    ctx.beginPath();
                    ctx.arc(node.x + input.x, node.y + input.y, 8, 0, Math.PI * 2);
                    ctx.fillStyle = '#e94560';
                    ctx.fill();
                }
                
                for (let output of node.outputs) {
                    ctx.beginPath();
                    ctx.arc(node.x + output.x, node.y + output.y, 8, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffd700';
                    ctx.fill();
                }
            }
        }
        
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        render();
    </script>
</body>
</html>
