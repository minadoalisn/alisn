<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="艾里森灯光设计工具 - 在线灯光装置设计节点界面，用于内部灯光设计工作流程，客户可以在线设计灯光装置">
    <meta name="keywords" content="灯光设计工具,灯光装置设计,节点界面,在线设计,艾里森光电">
    <meta name="author" content="广东艾里森光电技术有限公司">
    <meta name="robots" content="index, follow">
    <title>灯光设计工具 - 在线灯光装置设计节点界面 - 艾里森光电</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; 
            background: #1a1a2e; 
            color: #fff; 
            overflow: hidden;
        }
        
        header { 
            background: linear-gradient(135deg, #16213e 0%, #0f0f23 100%); 
            padding: 15px 20px; 
            border-bottom: 2px solid #e94560;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo { font-size: 24px; font-weight: bold; color: #e94560; text-decoration: none; }
        
        .nav-links { display: flex; gap: 25px; list-style: none; }
        
        .nav-links a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 16px; 
            transition: color 0.3s;
        }
        
        .nav-links a:hover { color: #e94560; }
        
        .nav-links a.active { color: #e94560; border-bottom: 2px solid #e94560; }
        
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }
        
        .sidebar {
            width: 250px;
            background: #16213e;
            padding: 20px;
            border-right: 1px solid #333;
            overflow-y: auto;
        }
        
        .sidebar h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .node-item {
            background: #0f0f23;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #333;
        }
        
        .node-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }
        
        .node-item:active { cursor: grabbing; }
        
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f23 100%);
        }
        
        .canvas-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .toolbar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 35, 0.95);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            display: flex;
            gap: 10px;
        }
        
        .toolbar button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .toolbar button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }
        
        .welcome-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
        }
        
        .welcome-overlay h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #e94560;
        }
        
        .welcome-overlay p {
            font-size: 16px;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 200px; }
            .nav-links { gap: 15px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <header>
        <nav style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" class="logo">艾里森光电</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="services.html">主营业务</a></li>
                <li><a href="cases.html">案例展示</a></li>
                <li><a href="news.html">新闻资讯</a></li>
                <li><a href="light-designer.html" class="active" style="color: #FFD700; font-weight: bold;">🎨 灯光设计工具</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>灯光节点</h3>
            <div class="node-item" data-type="led">💡 LED灯</div>
            <div class="node-item" data-type="spotlight">🔦 聚光灯</div>
            <div class="node-item" data-type="wash">🌈 染色灯</div>
            <div class="node-item" data-type="laser">⚡ 激光灯</div>
            <div class="node-item" data-type="moving">🎭 摇头灯</div>
            <div class="node-item" data-type="strobe">✨ 频闪灯</div>
            <div class="node-item" data-type="fog">🌫️ 烟雾机</div>
            <div class="node-item" data-type="controller">🎛️ 控制器</div>
            
            <h3 style="margin-top: 30px;">效果节点</h3>
            <div class="node-item" data-type="flicker">🎬 闪烁效果</div>
            <div class="node-item" data-type="gradient">🎨 渐变效果</div>
            <div class="node-item" data-type="pulse">💓 脉冲效果</div>
            <div class="node-item" data-type="chase">🏃 追逐效果</div>
            <div class="node-item" data-type="random">🎲 随机效果</div>
        </aside>

        <main class="canvas-container">
            <div class="canvas-grid"></div>
            
            <div class="welcome-overlay" id="welcomeOverlay">
                <h2>🎨 灯光设计工具</h2>
                <p>从左侧拖拽节点到画布开始设计<br>
                支持灯光节点、效果节点的组合<br>
                可视化连接，实时预览效果</p>
            </div>

            <div class="toolbar">
                <button onclick="saveDesign()">💾 保存设计</button>
                <button onclick="clearCanvas()">🗑️ 清空画布</button>
                <button onclick="exportDesign()">📤 导出</button>
            </div>
        </main>
    </div>

    <script>
        function saveDesign() {
            alert('设计已保存！（演示版本）');
        }
        
        function clearCanvas() {
            if (confirm('确定要清空画布吗？')) {
                alert('画布已清空！（演示版本）');
            }
        }
        
        function exportDesign() {
            alert('设计已导出！（演示版本）');
        }
        
        // 拖拽功能（简化版）
        document.querySelectorAll('.node-item').forEach(item => {
            item.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', item.dataset.type);
            });
            item.setAttribute('draggable', 'true');
        });
        
        const canvas = document.querySelector('.canvas-container');
        canvas.addEventListener('dragover', (e) => {
            e.preventDefault();
        });
        canvas.addEventListener('drop', (e) => {
            e.preventDefault();
            const type = e.dataTransfer.getData('text/plain');
            document.getElementById('welcomeOverlay').style.display = 'none';
            alert('已添加节点：' + type + '（演示版本）');
        });
    </script>
</body>
</html>
